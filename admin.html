<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Inter', sans-serif;
  background:#eef1f7;
  margin:0;
}

.header {
  background:#4f46e5;
  color:white;
  padding:15px;
  font-size:20px;
}

.container {
  padding:20px;
}

.card {
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.row {
  margin:5px 0;
}

a {
  color:#4f46e5;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="header">📊 Live User Dashboard</div>

<div class="container" id="data"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("data");

onValue(ref(db,"users"),(snapshot)=>{
  container.innerHTML="";

  snapshot.forEach(child=>{
    let d = child.val();

    container.innerHTML += `
      <div class="card">
        <div class="row"><b>📍 Location:</b> ${d.latitude}, ${d.longitude}</div>
        <div class="row">🌍 ${d.city}, ${d.country}</div>
        <div class="row">📱 ${d.platform}</div>
        <div class="row">⏱️ ${d.time}</div>
        <div class="row"><a href="${d.map}" target="_blank">Open in Maps</a></div>
      </div>
    `;
  });
});
</script>

</body>
</html>
